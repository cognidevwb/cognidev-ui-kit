name: fast-moving
on:
  schedule:
    - cron: '17 * * * *'   # hourly, staggered
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  churn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_TOKEN }}
          fetch-depth: 0
      - name: git identity
        run: |
          git config user.name  "cognidev-bot"
          git config user.email "bot@cognidev.dev"
      - name: open a fresh PR
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -e
          TS=$(date -u +%Y%m%d-%H%M)
          BR="bot/update-$TS"
          git checkout -b "$BR"
          node scripts/bump.cjs
          git add -A
          git commit -m "chore: automated update $TS"
          git push origin "$BR"
          gh pr create --base main --head "$BR"             --title "chore: automated update $TS"             --body "Automated fast-moving fixture PR generated by the hourly cron."
      - name: heartbeat commit on main
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          set -e
          TS=$(date -u +%Y%m%d-%H%M)
          git checkout main
          git pull --ff-only origin main || true
          mkdir -p .cognidev-activity
          echo "heartbeat $TS" >> .cognidev-activity/pulse.log
          git add -A
          git commit -m "chore: heartbeat $TS"
          git push origin main
      - name: keep only the 4 newest bot PRs open
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          gh pr list --state open --limit 100             --json number,headRefName,createdAt             | jq -r 'sort_by(.createdAt) | reverse
                     | map(select(.headRefName|startswith("bot/")))
                     | .[4:] | .[].number'             | while read -r n; do [ -n "$n" ] && gh pr close "$n" --delete-branch || true; done
